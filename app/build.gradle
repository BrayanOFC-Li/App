plugins {
    id 'com.android.application'
}

android {
    namespace 'com.panel'
    compileSdk 34

    defaultConfig {
        applicationId "com.panel"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildFeatures {
        buildConfig true
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
name: MiPanelApp APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install SDK
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 🔥 VERIFICAR ESTRUCTURA (MUY IMPORTANTE)
      - name: Mostrar estructura del proyecto
        run: ls -R

      # 🔥 CREAR WRAPPER BIEN
      - name: Crear Gradle Wrapper
        run: gradle wrapper

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      # 🔥 BUILD CON DEBUG REAL
      - name: Build APK (ULTRA DEBUG)
        run: ./gradlew assembleDebug --stacktrace --info --debug --warning-mode all

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: MiPanelApp-APK
          path: app/build/outputs/apk/debug/app-debug.apk